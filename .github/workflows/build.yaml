name: Build and Publish Container

on:
  push:
    branches: [main]
    paths:
      - "music_assistant_youtube/**"
      - ".github/workflows/build.yaml"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Determine upstream version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=""
          if [ -f .upstream-version ]; then
            VERSION=$(cat .upstream-version)
          fi
          # Never use "latest" as a version tag — resolve it to an actual release
          if [ -z "$VERSION" ] || [ "$VERSION" = "latest" ]; then
            VERSION=$(gh api repos/music-assistant/server/releases/latest --jq '.tag_name')
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract arch suffix
        id: arch
        run: |
          PLATFORM="${{ matrix.platform }}"
          ARCH="${PLATFORM#linux/}"
          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: music_assistant_youtube
          file: music_assistant_youtube/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/music-assistant/server:${{ steps.version.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/music-assistant-yt-dlp/${{ steps.arch.outputs.arch }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/music-assistant-yt-dlp/${{ steps.arch.outputs.arch }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release for provider changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cat .upstream-version)
          # Append a patch suffix based on short SHA to distinguish provider-only rebuilds
          TAG="${VERSION}-patch.$(git rev-parse --short HEAD)"

          # Update config.yaml to match the new tag
          sed -i "s/^version:.*/version: ${TAG}/" music_assistant_youtube/config.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add music_assistant_youtube/config.yaml
          git commit -m "chore: bump version to ${TAG}" || true
          git push || true

          gh release create "$TAG" \
            --title "Provider update $TAG" \
            --notes "Provider code change rebuild based on upstream Music Assistant \`$VERSION\`." \
            --latest
