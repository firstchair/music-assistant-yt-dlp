name: Build and Publish Container

on:
  push:
    branches: [main]
    paths:
      - "music_assistant_youtube/**"
      - "music_assistant_youtube_beta/**"
      - "youtube_provider/**"
      - ".github/workflows/build.yaml"
  workflow_dispatch:
  workflow_call:
    inputs:
      addon_dir:
        description: "Build only this addon dir (default: build both)"
        required: false
        type: string
        default: ""
      upstream_version:
        description: "Upstream MA version to build against (overrides .upstream-version)"
        required: false
        type: string
        default: ""

env:
  REGISTRY: ghcr.io

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          ADDON_DIR: ${{ inputs.addon_dir }}
        run: |
          if [ "$ADDON_DIR" = "music_assistant_youtube" ]; then
            echo 'matrix={"addon":[{"dir":"music_assistant_youtube","image":"music-assistant-yt-dlp"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$ADDON_DIR" = "music_assistant_youtube_beta" ]; then
            echo 'matrix={"addon":[{"dir":"music_assistant_youtube_beta","image":"music-assistant-yt-dlp-beta"}]}' >> "$GITHUB_OUTPUT"
          else
            # Default: build BOTH
            echo 'matrix={"addon":[{"dir":"music_assistant_youtube","image":"music-assistant-yt-dlp"},{"dir":"music_assistant_youtube_beta","image":"music-assistant-yt-dlp-beta"}]}' >> "$GITHUB_OUTPUT"
          fi

  prepare:
    needs: matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    outputs:
      version_stable: ${{ steps.version.outputs.version_stable }}
      version_beta: ${{ steps.version.outputs.version_beta }}
      base_tag_stable: ${{ steps.version.outputs.base_tag_stable }}
      base_tag_beta: ${{ steps.version.outputs.base_tag_beta }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Determine version for ${{ matrix.addon.dir }}
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.upstream_version }}
          ADDON_DIR: ${{ matrix.addon.dir }}
        run: |
          # Read pinned MA version for this addon
          BASE=""
          if [ -f "${ADDON_DIR}/.upstream-version" ]; then
            BASE=$(cat "${ADDON_DIR}/.upstream-version")
          fi

          # workflow_call may override with explicit upstream version
          if [ -n "$INPUT_VERSION" ]; then
            BASE="$INPUT_VERSION"
          fi

          # Fallback: detect from API
          if [ -z "$BASE" ] || [ "$BASE" = "latest" ]; then
            if [ "$ADDON_DIR" = "music_assistant_youtube" ]; then
              BASE=$(gh api repos/music-assistant/server/releases/latest --jq '.tag_name')
            else
              BASE=$(gh api 'repos/music-assistant/server/releases?per_page=30' \
                --jq '[.[] | select(.draft == false) | select(.tag_name | test("\\.dev") | not)] | .[0].tag_name')
            fi
          fi

          # For push events (provider code changes), append a patch suffix
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${BASE}-patch.$(git rev-parse --short HEAD)"
          else
            VERSION="$BASE"
          fi

          # Output per addon (stable/beta)
          if [ "$ADDON_DIR" = "music_assistant_youtube" ]; then
            echo "base_tag_stable=$BASE" >> "$GITHUB_OUTPUT"
            echo "version_stable=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "base_tag_beta=$BASE" >> "$GITHUB_OUTPUT"
            echo "version_beta=$VERSION" >> "$GITHUB_OUTPUT"
          fi

          # Bump config.yaml on push events (provider code changed)
          if [ "${{ github.event_name }}" = "push" ]; then
            sed -i "s/^version:.*/version: ${VERSION}/" "${ADDON_DIR}/config.yaml"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "${ADDON_DIR}/config.yaml" || true
            git commit -m "chore(${ADDON_DIR}): bump version to ${VERSION}" || true
            git push || true
          fi

  build:
    needs: [matrix, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/aarch64
        addon: ${{ fromJson(needs.matrix.outputs.matrix).addon }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve version + base for this addon
        id: ver
        env:
          ADDON_DIR: ${{ matrix.addon.dir }}
          STABLE_VER: ${{ needs.prepare.outputs.version_stable }}
          STABLE_BASE: ${{ needs.prepare.outputs.base_tag_stable }}
          BETA_VER: ${{ needs.prepare.outputs.version_beta }}
          BETA_BASE: ${{ needs.prepare.outputs.base_tag_beta }}
        run: |
          if [ "$ADDON_DIR" = "music_assistant_youtube" ]; then
            echo "version=$STABLE_VER" >> "$GITHUB_OUTPUT"
            echo "base_tag=$STABLE_BASE" >> "$GITHUB_OUTPUT"
          else
            echo "version=$BETA_VER" >> "$GITHUB_OUTPUT"
            echo "base_tag=$BETA_BASE" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage youtube_provider into addon dir
        run: cp -r youtube_provider ${{ matrix.addon.dir }}/youtube_provider

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract arch suffix
        id: arch
        run: |
          PLATFORM="${{ matrix.platform }}"
          ARCH="${PLATFORM#linux/}"
          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.addon.dir }}
          file: ${{ matrix.addon.dir }}/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/music-assistant/server:${{ steps.ver.outputs.base_tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.addon.image }}/${{ steps.arch.outputs.arch }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.addon.image }}/${{ steps.arch.outputs.arch }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
