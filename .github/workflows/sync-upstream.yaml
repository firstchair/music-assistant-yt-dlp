name: Sync Upstream MA Release (beta channel)

on:
  schedule:
    # Check for new upstream releases every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
      upstream_notes: ${{ steps.check.outputs.upstream_notes }}
    steps:
      - uses: actions/checkout@v4

      - name: Get latest upstream MA server release (beta channel)
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Track BETA channel: latest release of any kind (stable or beta), but skip
          # daily ".dev" builds — those are too unstable for an add-on.
          # Releases endpoint returns sorted by published_at desc; pick the first one
          # that is not a draft and is not a .dev build.
          UPSTREAM_VERSION=$(gh api 'repos/music-assistant/server/releases?per_page=30' \
            --jq '[.[] | select(.draft == false) | select(.tag_name | test("\\.dev") | not)] | .[0].tag_name')

          if [ -z "$UPSTREAM_VERSION" ] || [ "$UPSTREAM_VERSION" = "null" ]; then
            echo "Failed to resolve upstream version" >&2
            exit 1
          fi
          echo "upstream_version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"

          # Capture upstream release notes (use delimiter for multiline)
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "upstream_notes<<$EOF_MARKER" >> "$GITHUB_OUTPUT"
          gh api "repos/music-assistant/server/releases/tags/$UPSTREAM_VERSION" --jq '.body' >> "$GITHUB_OUTPUT"
          echo "$EOF_MARKER" >> "$GITHUB_OUTPUT"

          # Read the version we last built against
          CURRENT_VERSION=""
          if [ -f .upstream-version ]; then
            CURRENT_VERSION=$(cat .upstream-version)
          fi

          if [ "$UPSTREAM_VERSION" != "$CURRENT_VERSION" ]; then
            echo "new_release=true" >> "$GITHUB_OUTPUT"
            echo "New upstream release detected: $UPSTREAM_VERSION (was: $CURRENT_VERSION)"
          else
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date: $CURRENT_VERSION"
          fi

  update:
    needs: check-upstream
    if: needs.check-upstream.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update tracked version
        env:
          UPSTREAM_VERSION: ${{ needs.check-upstream.outputs.upstream_version }}
        run: |
          echo "$UPSTREAM_VERSION" > .upstream-version

          # Update the add-on config version to match upstream
          sed -i "s/^version:.*/version: ${UPSTREAM_VERSION}/" music_assistant_youtube/config.yaml

          # Update build.yaml base image tags
          sed -i "s|ghcr.io/music-assistant/server:[^ ]*|ghcr.io/music-assistant/server:${UPSTREAM_VERSION}|g" music_assistant_youtube/build.yaml

      - name: Update changelog
        env:
          UPSTREAM_VERSION: ${{ needs.check-upstream.outputs.upstream_version }}
          UPSTREAM_NOTES: ${{ needs.check-upstream.outputs.upstream_notes }}
        run: |
          CHANGELOG="music_assistant_youtube/CHANGELOG.md"
          {
            echo "## ${UPSTREAM_VERSION}"
            echo "- Upstream Music Assistant server update to ${UPSTREAM_VERSION}"
            echo ""
            echo "### Upstream Release Notes"
            echo "${UPSTREAM_NOTES}"
            echo ""
            if [ -f "$CHANGELOG" ]; then
              cat "$CHANGELOG"
            fi
          } > "$CHANGELOG.tmp"
          mv "$CHANGELOG.tmp" "$CHANGELOG"

      - name: Commit version bump
        env:
          UPSTREAM_VERSION: ${{ needs.check-upstream.outputs.upstream_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .upstream-version music_assistant_youtube/config.yaml music_assistant_youtube/build.yaml music_assistant_youtube/CHANGELOG.md
          git commit -m "chore: bump upstream MA to ${UPSTREAM_VERSION}"
          git push

  build:
    needs: [check-upstream, update]
    if: needs.check-upstream.outputs.new_release == 'true'
    uses: ./.github/workflows/build.yaml
    with:
      upstream_version: ${{ needs.check-upstream.outputs.upstream_version }}
    permissions:
      contents: write
      packages: write

  release:
    needs: [check-upstream, build]
    if: needs.check-upstream.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_VERSION: ${{ needs.check-upstream.outputs.upstream_version }}
          UPSTREAM_NOTES: ${{ needs.check-upstream.outputs.upstream_notes }}
        run: |
          NOTES="Automated rebuild tracking upstream Music Assistant server release \`$UPSTREAM_VERSION\`.

          ## Upstream Release Notes

          $UPSTREAM_NOTES"

          gh release create "$UPSTREAM_VERSION" \
            --title "Music Assistant $UPSTREAM_VERSION" \
            --notes "$NOTES" \
            --latest
