<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Tool box with up/down arrows representing export/import -->
  <rect x="5" y="5" width="90" height="90" rx="18" ry="18" fill="#5b8def"/>
  <!-- Export arrow (up) -->
  <path d="M 30 65 L 30 45 L 22 45 L 35 30 L 48 45 L 40 45 L 40 65 Z" fill="#ffffff"/>
  <!-- Import arrow (down) -->
  <path d="M 60 35 L 60 55 L 52 55 L 65 70 L 78 55 L 70 55 L 70 35 Z" fill="#ffffff"/>
</svg>
